    if(c.education==="博士")s+=20;else if(c.education==="硕士")s+=12;else if(c.education==="本科")s+=5;
    s+=Math.min(c.experience*3,30);
    const topSchools=["北京大学","清华大学","复旦大学","上海交通大学","中科院","哈尔滨工业大学","浙江大学","中山大学"];
    if(topSchools.includes(c.school))s+=8;
    s+=Math.min(c.skills.length*2,10);
    return Math.min(99,Math.max(40,s+Math.floor(Math.random()*6-3)));
  },
  match(candidate,job){
    let score=0;
    job.skills.forEach(s=>{
      if(candidate.skills.some(cs=>cs.toLowerCase().includes(s.toLowerCase())||s.toLowerCase().includes(cs.toLowerCase())))score+=20;
    });
    if(candidate.position.includes(job.title.replace("高级","").replace("（Java）","").replace("AI","").trim()))score+=30;
    return Math.min(100,score);
  },
  recommend(candidates,job){
    return [...candidates]
      .map(c=>({...c,matchScore:AI.match(c,job)}))
      .sort((a,b)=>b.matchScore-a.matchScore)
      .slice(0,5);
  },
  autoFilter(candidates,criteria){
    return candidates.filter(c=>{
      if(criteria.education&&criteria.education!=="全部"&&c.education!==criteria.education)return false;
      if(criteria.gender&&criteria.gender!=="全部"&&c.gender!==criteria.gender)return false;
      if(criteria.minExp!=null&&c.experience<criteria.minExp)return false;
      if(criteria.minScore!=null&&c.score<criteria.minScore)return false;
      if(criteria.city&&criteria.city!=="全部"&&!c.city.includes(criteria.city))return false;
      if(criteria.skill&&!c.skills.some(s=>s.toLowerCase().includes(criteria.skill.toLowerCase())))return false;
      if(criteria.position&&!c.position.includes(criteria.position))return false;
      return true;
    });
  },
  generateReport(c){
    const edu={博士:"顶级学历背景，学术能力突出",硕士:"研究生学历，理论基础扎实",本科:"本科学历，工程实践能力强"}[c.education]||"学历背景良好";
    const exp=c.experience>=8?"资深专家级候选人，经验非常丰富":c.experience>=5?"中高级候选人，具备丰富项目经验":c.experience>=3?"中级候选人，有一定工作积累":c.experience>=1?"初级候选人，有基础工作经验":"应届/初入职场，可塑性强";
    const scoreLevel=c.score>=90?"综合评分优秀，强烈推荐":c.score>=80?"综合评分良好，建议安排面试":c.score>=70?"综合评分中等，需进一步考察":"综合评分偏低，谨慎推进";
    return`【AI综合分析报告】\n\n候选人：${c.name}｜${c.position}｜${c.education}·${c.school}\n\n📊 评分：${c.score}/100（${scoreLevel}）\n\n🎓 学历分析：${edu}，毕业于${c.school}${c.major}专业。\n\n💼 经验评估：${exp}，工作${c.experience}年，掌握${c.skills.join("、")}等技能。\n\n💰 薪资匹配：期望${c.salary}，与市场行情${c.score>=85?"高度匹配":"基本匹配"}。\n\n🏙️ 地域：位于${c.city}，${c.city==="北京"||c.city==="上海"?"无需异地搬迁":"可能需要考虑异地情况"}。\n\n✅ 综合建议：${c.aiComment}`;
  },
  chatReply(msg,candidates){
    const m=msg.toLowerCase();
    if(m.includes("多少")||m.includes("几个")||m.includes("数量")){
      const total=candidates.length;
      const byStatus={};
      candidates.forEach(c=>{byStatus[c.status]=(byStatus[c.status]||0)+1;});
      return`📊 当前共有 **${total}** 位候选人。\n\n状态分布：\n${Object.entries(byStatus).map(([k,v])=>`• ${k}：${v}人`).join("\n")}\n\n平均评分：**${(candidates.reduce((a,c)=>a+c.score,0)/candidates.length).toFixed(1)}** 分`;
    }
    if(m.includes("最高分")||m.includes("最好")||m.includes("top")){
      const top=candidates.sort((a,b)=>b.score-a.score).slice(0,3);
      return`🏆 评分最高的3位候选人：\n\n${top.map((c,i)=>`${i+1}. **${c.name}**（${c.score}分）- ${c.position}，${c.education}，${c.experience}年经验`).join("\n")}`;
    }
    if(m.includes("博士")){
      const ds=candidates.filter(c=>c.education==="博士");
      return`🎓 共有 **${ds.length}** 位博士学历候选人：\n${ds.map(c=>`• ${c.name}（${c.score}分）- ${c.position}`).join("\n")}`;
    }
    if(m.includes("硕士")){
      const ms=candidates.filter(c=>c.education==="硕士");
      return`🎓 共有 **${ms.length}** 位硕士学历候选人：\n${ms.map(c=>`• ${c.name}（${c.score}分）- ${c.position}`).join("\n")}`;
    }
    if(m.includes("待面试")){
      const ws=candidates.filter(c=>c.status==="待面试");
      return`📅 共有 **${ws.length}** 位候选人等待面试：\n${ws.map(c=>`• ${c.name} - ${c.position}`).join("\n")}`;
    }
    if(m.includes("北京")){
      const bj=candidates.filter(c=>c.city==="北京");
      return`🏙️ 北京共有 **${bj.length}** 位候选人：\n${bj.map(c=>`• ${c.name}（${c.score}分）- ${c.position}`).join("\n")}`;
    }
    if(m.includes("上海")){
      const sh=candidates.filter(c=>c.city==="上海");
      return`🏙️ 上海共有 **${sh.length}** 位候选人：\n${sh.map(c=>`• ${c.name}（${c.score}分）- ${c.position}`).join("\n")}`;
    }
    if(m.includes("女")||m.includes("女性")){
      const fs=candidates.filter(c=>c.gender==="女");
      return`👩 共有 **${fs.length}** 位女性候选人，平均评分 ${(fs.reduce((a,c)=>a+c.score,0)/fs.length).toFixed(1)} 分。\n${fs.map(c=>`• ${c.name}（${c.score}分）- ${c.position}`).join("\n")}`;
    }
    if(m.includes("男")||m.includes("男性")){
      const ms2=candidates.filter(c=>c.gender==="男");
      return`👨 共有 **${ms2.length}** 位男性候选人，平均评分 ${(ms2.reduce((a,c)=>a+c.score,0)/ms2.length).toFixed(1)} 分。`;
    }
    if(m.includes("分析")||m.includes("报告")||m.includes("总结")){
      const avg=(candidates.reduce((a,c)=>a+c.score,0)/candidates.length).toFixed(1);
      const top90=candidates.filter(c=>c.score>=90).length;
      const offered=candidates.filter(c=>c.status==="已Offer").length;
      return`📈 **当前招聘整体分析**\n\n• 候选人总数：**${candidates.length}人**\n• 平均评分：**${avg}分**\n• 高分候选人（≥90分）：**${top90}人**\n• 已发Offer：**${offered}人**\n• 录用率：**${(offered/candidates.length*100).toFixed(1)}%**\n\n💡 建议：优先跟进${candidates.filter(c=>c.score>=90&&c.status!=="已Offer").map(c=>c.name).join("、")}等高分候选人，加快推进面试流程。`;
    }
    if(m.includes("90")||m.includes("高分")){
      const hs=candidates.filter(c=>c.score>=90);
      return`⭐ 评分90分以上共 **${hs.length}** 位候选人：\n${hs.map(c=>`• ${c.name}（${c.score}分）- ${c.position}，当前${c.status}`).join("\n")}`;
    }
    if(m.includes("前端")){
      const fe=candidates.filter(c=>c.position.includes("前端"));
      return`💻 前端相关候选人共 **${fe.length}** 位：\n${fe.map(c=>`• ${c.name}（${c.score}分）- ${c.education}，${c.experience}年经验`).join("\n")}`;
    }
    if(m.includes("帮我筛选")||m.includes("筛选")||m.includes("过滤")){
      return`⚡ 我来帮您分析筛选方向！\n\n请在左侧「智能筛选」模块设置具体条件，支持：\n• 按学历（本科/硕士/博士）\n• 按性别\n• 按经验年限\n• 按AI评分\n• 按城市\n• 按技能关键词\n\n或者直接告诉我具体要求，比如：「帮我找北京的硕士以上、5年以上经验的工程师」，我来给你列出结果。`;
    }
    if(m.includes("offer")||m.includes("录用")){
      const off=candidates.filter(c=>c.status==="已Offer");
      return`✅ 已发放Offer共 **${off.length}** 位：\n${off.map(c=>`• ${c.name} - ${c.position}（${c.score}分）`).join("\n")||"暂无"}`;
    }
    const greetings=["你好","您好","hi","hello","嗨"];
    if(greetings.some(g=>m.includes(g))){
      return`您好！👋 我是 HireNova AI 招聘助手。\n\n我可以帮您：\n• 📊 查询候选人数据和统计信息\n• 🔍 分析候选人情况\n• 💡 提供招聘建议\n• 📈 生成招聘报告\n\n试试问我：「当前有多少候选人？」或「分析一下整体招聘情况」`;
    }
    return`💬 我理解您在询问关于「${msg}」的问题。\n\n作为AI招聘助手，我可以帮您：\n• 查询候选人数量、状态分布\n• 分析高分候选人情况\n• 筛选特定条件候选人\n• 生成招聘数据报告\n\n请尝试更具体的问题，例如：\n「评分90分以上有几人？」\n「北京有哪些候选人？」\n「分析当前招聘整体情况」`;
  }
};

function Dashboard({stats,candidates,setPage}){

  const recentApplied=[...candidates].sort((a,b)=>b.appliedAt.localeCompare(a.appliedAt)).slice(0,6);
  const funnelData=[

                <div style={{fontSize:11,color:"#4b5563"}}>{c.school} · {c.appliedAt}</div>
              </div>
              <StatusBadge status={c.status}/>

/* ═══════════════════════════════════════════════════
   CANDIDATES PAGE
═══════════════════════════════════════════════════ */
function CandidatesPage({candidates,updateStatus,setCandidates,notify}){
  const [search,setSearch]=useState("");
  const [fStatus,setFStatus]=useState("全部");
  const [fEdu,setFEdu]=useState("全部");
  const [fGender,setFGender]=useState("全部");
  const [fCity,setFCity]=useState("全部");
  const [sort,setSort]=useState("score");
  const [selected,setSelected]=useState(null);
  const [detailTab,setDetailTab]=useState("info");
  const [showAddModal,setShowAddModal]=useState(false);

  const cities=[...new Set(candidates.map(c=>c.city))];

  const filtered=useMemo(()=>candidates
    .filter(c=>fStatus==="全部"||c.status===fStatus)
    .filter(c=>fEdu==="全部"||c.education===fEdu)
    .filter(c=>fGender==="全部"||c.gender===fGender)
    .filter(c=>fCity==="全部"||c.city===fCity)
    .filter(c=>!search||c.name.includes(search)||c.position.includes(search)||c.school.includes(search)||c.skills.some(s=>s.includes(search)))
    .sort((a,b)=>{
      if(sort==="score")return b.score-a.score;
      if(sort==="date")return b.appliedAt.localeCompare(a.appliedAt);
      if(sort==="name")return a.name.localeCompare(b.name);
      return 0;
    }),[candidates,fStatus,fEdu,fGender,fCity,search,sort]);

  return(
    <div style={{display:"grid",gridTemplateColumns:selected?"1fr 360px":"1fr",gap:18,height:"calc(100vh - 96px)"}}>
      <div style={{overflow:"auto"}}>
        <SectionHead title="候选人管理" sub={`共 ${filtered.length} 位候选人`}
          action={<button className="btn btn-primary" style={{fontSize:12}} onClick={()=>setShowAddModal(true)}>+ 添加候选人</button>}/>

        {/* Filters */}
        <div style={{display:"flex",gap:10,marginBottom:16,flexWrap:"wrap"}}>
          <input className="inp" value={search} onChange={e=>setSearch(e.target.value)} placeholder="🔍  搜索姓名、职位、学校、技能..." style={{flex:1,minWidth:220}}/>
          <select className="inp" value={fStatus} onChange={e=>setFStatus(e.target.value)} style={{width:110}}>
            {["全部","初筛","已筛选","待面试","已Offer","已拒绝"].map(s=><option key={s}>{s}</option>)}
          </select>
          <select className="inp" value={fEdu} onChange={e=>setFEdu(e.target.value)} style={{width:100}}>
            {["全部","本科","硕士","博士"].map(s=><option key={s}>{s}</option>)}
          </select>
          <select className="inp" value={fGender} onChange={e=>setFGender(e.target.value)} style={{width:80}}>
            {["全部","男","女"].map(s=><option key={s}>{s}</option>)}
          </select>
          <select className="inp" value={fCity} onChange={e=>setFCity(e.target.value)} style={{width:95}}>
            {["全部",...cities].map(s=><option key={s}>{s}</option>)}
          </select>
          <select className="inp" value={sort} onChange={e=>setSort(e.target.value)} style={{width:100}}>
            <option value="score">按评分</option>
            <option value="date">按时间</option>
            <option value="name">按姓名</option>
          </select>
        </div>

        {/* Table */}
        <div className="card" style={{overflow:"hidden"}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 70px 60px 90px 60px 100px 80px 110px",padding:"9px 16px",background:"rgba(255,255,255,0.02)",fontSize:11,color:"#6b7280",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
            <span>姓名 / 职位</span><span>学历</span><span>性别</span><span>院校</span><span>经验</span><span>状态</span><span style={{textAlign:"center"}}>评分</span><span>操作</span>
          </div>
          {filtered.length===0&&(
            <div style={{padding:40,textAlign:"center",color:"#4b5563"}}>
              <div style={{fontSize:32,marginBottom:8}}>🔍</div>
              没有符合条件的候选人
            </div>
          )}
          {filtered.map(c=>(
            <div key={c.id} onClick={()=>setSelected(selected?.id===c.id?null:c)} style={{display:"grid",gridTemplateColumns:"1fr 70px 60px 90px 60px 100px 80px 110px",padding:"11px 16px",borderBottom:"1px solid rgba(255,255,255,0.03)",cursor:"pointer",background:selected?.id===c.id?"rgba(99,102,241,0.07)":"transparent",transition:"background .13s"}}>
              <div style={{display:"flex",alignItems:"center",gap:9}}>
                <Avatar name={c.name} size={32}/>
                <div>
                  <div style={{fontSize:13,color:"#f1f5f9",fontWeight:500}}>{c.name}</div>
                  <div style={{fontSize:11,color:"#6b7280"}}>{c.position}</div>
                </div>
              </div>
              <span style={{fontSize:12,color:"#9ca3af",alignSelf:"center"}}>{c.education}</span>
              <span style={{fontSize:12,color:"#9ca3af",alignSelf:"center"}}>{c.gender}</span>
              <span style={{fontSize:11,color:"#9ca3af",alignSelf:"center",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{c.school}</span>
              <span style={{fontSize:12,color:"#9ca3af",alignSelf:"center"}}>{c.experience}年</span>
              <div style={{alignSelf:"center"}}><StatusBadge status={c.status}/></div>
              <div style={{alignSelf:"center",textAlign:"center"}}><ScoreRing score={c.score} size={34}/></div>
              <div style={{alignSelf:"center",display:"flex",gap:5}} onClick={e=>e.stopPropagation()}>
                <button className="btn btn-success" style={{fontSize:10,padding:"4px 8px"}} onClick={()=>updateStatus(c.id,"已筛选")}>通过</button>
                <button className="btn btn-danger" style={{fontSize:10,padding:"4px 8px"}} onClick={()=>updateStatus(c.id,"已拒绝")}>拒绝</button>
              </div>
            </div>
          ))}
        </div>
      </div>

      {/* Detail Panel */}
      {selected&&(
        <div className="card slideIn" style={{padding:0,overflow:"auto",height:"fit-content",maxHeight:"calc(100vh - 96px)",position:"sticky",top:0}}>
          {/* Header */}
          <div style={{padding:"16px 18px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
              <div style={{display:"flex",gap:12,alignItems:"flex-start"}}>
                <Avatar name={selected.name} size={48}/>
                <div>
                  <div style={{fontSize:16,fontWeight:700,color:"#f1f5f9"}}>{selected.name}</div>
                  <div style={{fontSize:12,color:"#6b7280",marginTop:2}}>{selected.position}</div>
                  <div style={{display:"flex",gap:6,marginTop:6,flexWrap:"wrap"}}>
                    <StatusBadge status={selected.status}/>
                    {selected.tags?.map((t,i)=><Tag key={i} label={t} color={["#6366f1","#10b981","#f59e0b","#ec4899"][i%4]}/>)}
                  </div>
                </div>
              </div>
              <button onClick={()=>setSelected(null)} style={{background:"none",border:"none",color:"#6b7280",cursor:"pointer",fontSize:18,lineHeight:1}}>×</button>
            </div>
            <div style={{display:"flex",justifyContent:"space-around",marginTop:14,background:"rgba(255,255,255,0.03)",borderRadius:10,padding:"10px 0"}}>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:700,color:selected.score>=90?"#10b981":selected.score>=75?"#f59e0b":"#9ca3af"}}>{selected.score}</div>
                <div style={{fontSize:10,color:"#6b7280"}}>AI评分</div>
              </div>
              <div style={{width:1,background:"rgba(255,255,255,0.06)"}}></div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:700,color:"#e2e8f0"}}>{selected.experience}年</div>
                <div style={{fontSize:10,color:"#6b7280"}}>工作经验</div>
              </div>
              <div style={{width:1,background:"rgba(255,255,255,0.06)"}}></div>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:22,fontWeight:700,color:"#e2e8f0"}}>{selected.interviewCount}</div>
                <div style={{fontSize:10,color:"#6b7280"}}>面试次数</div>
              </div>
            </div>
          </div>

          {/* Tabs */}
          <div style={{display:"flex",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
            {[["info","基本信息"],["resume","简历详情"],["ai","AI分析"]].map(([k,lb])=>(
              <button key={k} onClick={()=>setDetailTab(k)} style={{flex:1,padding:"10px 0",background:"none",border:"none",color:detailTab===k?"#a5b4fc":"#6b7280",fontSize:12,cursor:"pointer",borderBottom:detailTab===k?"2px solid #6366f1":"2px solid transparent",fontWeight:detailTab===k?600:400}}>
                {lb}
              </button>
            ))}
          </div>

          <div style={{padding:"14px 18px"}}>
            {detailTab==="info"&&(
              <div>
                {[["性别",selected.gender],["年龄",`${selected.age}岁`],["学历",selected.education],["院校",selected.school],["专业",selected.major],["经验",`${selected.experience}年`],["薪资",selected.salary],["城市",selected.city],["电话",selected.phone],["邮箱",selected.email],["申请",selected.appliedAt]].map(([l,v],i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:12}}>
                    <span style={{color:"#6b7280"}}>{l}</span>
                    <span style={{color:"#e2e8f0",fontWeight:500,maxWidth:180,textAlign:"right",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{v}</span>
                  </div>
                ))}
                <div style={{marginTop:12}}>
                  <div style={{fontSize:11,color:"#6b7280",marginBottom:6}}>技能标签</div>
                  <div style={{display:"flex",flexWrap:"wrap",gap:5}}>
                    {selected.skills.map((s,i)=><Tag key={i} label={s}/>)}
                  </div>
                </div>
              </div>
            )}
            {detailTab==="resume"&&(
              <div>
                <div style={{background:"rgba(255,255,255,0.03)",borderRadius:8,padding:12,marginBottom:12,fontSize:12,color:"#94a3b8",lineHeight:1.8}}>
                  {selected.resumeText}
                </div>
                <div style={{fontSize:11,color:"#6b7280",marginBottom:8}}>能力评估</div>
                {[
                  {label:"技术能力",val:Math.min(100,Math.round(selected.score*0.92))},
                  {label:"工作经验",val:Math.min(100,selected.experience*11)},
                  {label:"学历背景",val:selected.education==="博士"?97:selected.education==="硕士"?86:74},
                  {label:"技能丰富度",val:Math.min(100,selected.skills.length*18)},
                  {label:"综合潜力",val:Math.min(100,Math.round(selected.score*0.88))},
                ].map((r,i)=>(
                  <div key={i} style={{marginBottom:10}}>
                    <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                      <span style={{color:"#9ca3af"}}>{r.label}</span>
                      <span style={{color:"#e2e8f0",fontWeight:600}}>{r.val}</span>
                    </div>
                    <ProgressBar value={r.val} color={`hsl(${230+i*15},70%,65%)`}/>
                  </div>
                ))}
              </div>
            )}
            {detailTab==="ai"&&(
              <div>
                <div className="ai-badge" style={{marginBottom:10,fontSize:11}}>⚡ AI 智能分析</div>
                <div style={{background:"rgba(99,102,241,0.07)",border:"1px solid rgba(99,102,241,0.18)",borderRadius:9,padding:12,fontSize:12,color:"#c7d2fe",lineHeight:1.9,marginBottom:12,whiteSpace:"pre-line"}}>
                  {AI.generateReport(selected)}
                </div>
              </div>
            )}

            {/* Actions */}
            <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8,marginTop:14}}>
              <button className="btn btn-primary" style={{fontSize:12,padding:"9px"}} onClick={()=>{updateStatus(selected.id,"待面试");notify("已安排面试")}}>📅 安排面试</button>
              <button className="btn btn-success" style={{fontSize:12,padding:"9px"}} onClick={()=>{updateStatus(selected.id,"已Offer");notify("Offer 已发送！")}}>✉️ 发Offer</button>
              <button className="btn btn-ghost" style={{fontSize:12,padding:"8px"}} onClick={()=>updateStatus(selected.id,"已筛选")}>✓ 标记通过</button>
              <button className="btn btn-danger" style={{fontSize:12,padding:"8px"}} onClick={()=>updateStatus(selected.id,"已拒绝")}>✗ 淘汰</button>
            </div>
          </div>
        </div>
      )}

      <AddCandidateModal open={showAddModal} onClose={()=>setShowAddModal(false)} onAdd={c=>{setCandidates(p=>[{...c,id:Date.now(),score:AI.score(c),appliedAt:new Date().toISOString().slice(0,10),interviewCount:0,offerSent:false},...p]);notify("候选人添加成功");setShowAddModal(false);}}/>
    </div>
  );
}

function AddCandidateModal({open,onClose,onAdd}){
  const [form,setForm]=useState({name:"",gender:"男",age:"",education:"本科",school:"",major:"",experience:"",position:"",skills:"",salary:"",city:"北京",phone:"",email:"",status:"初筛",resumeText:"",aiComment:"",tags:[]});
  const set=(k,v)=>setForm(p=>({...p,[k]:v}));
  return(
    <Modal open={open} onClose={onClose} title="添加候选人" width={560}>
      <div className="grid2">
        {[["姓名*","name","text",""],["年龄","age","number",""],["院校","school","text",""],["专业","major","text",""],["工作年限","experience","number",""],["应聘职位","position","text",""],["期望薪资","salary","text","如：20K-30K"],["所在城市","city","text",""],["联系电话","phone","text",""],["邮箱","email","email",""]].map(([lb,k,tp,ph])=>(

/* ═══════════════════════════════════════════════════
   UPLOAD PAGE
═══════════════════════════════════════════════════ */
function UploadPage({candidates,setCandidates,notify}){
  const [dragging,setDragging]=useState(false);
  const [queue,setQueue]=useState([]);
  const [processing,setProcessing]=useState(false);
  const [progress,setProgress]=useState(0);
  const ref=useRef();

  const addFiles=files=>{
    const newFiles=Array.from(files).map(f=>({id:Date.now()+Math.random(),name:f.name,size:f.size,type:f.name.split(".").pop().toUpperCase(),status:"待解析",parsed:null}));
    setQueue(p=>[...p,...newFiles]);
  };

  const processAll=async()=>{
    if(!queue.length||processing)return;
    setProcessing(true);setProgress(0);
    const mockNames=["陈浩","李婷","张明","王静","刘强","赵雪","钱鑫","孙磊","周梅","吴超","郑丽","黄涛","林燕","徐峰","何倩"];
    const mockSchools=["北京理工大学","华南理工大学","武汉大学","南开大学","东南大学","中国人民大学","华东师范大学","西北工业大学"];
    const mockPositions=["前端工程师","后端工程师","全栈工程师","数据工程师","产品经理","UI设计师","测试工程师","运维工程师"];
    const mockSkillSets=[["React","JavaScript","CSS"],["Java","Spring","MySQL"],["Python","Django","Redis"],["Vue","Node.js","MongoDB"],["Figma","Sketch","PS"],["SQL","Tableau","Excel"],["Go","K8s","Docker"],["iOS","Swift","Xcode"]];

    for(let i=0;i<queue.length;i++){
      await new Promise(r=>setTimeout(r,700+Math.random()*400));
      const name=mockNames[(i+candidates.length)%mockNames.length];
      const parsedCandidate={
        id:Date.now()+i,
        name,avatar:name[0],
        gender:Math.random()>0.5?"男":"女",
        age:22+Math.floor(Math.random()*12),
        education:["本科","硕士","本科","本科","硕士"][Math.floor(Math.random()*5)],
        school:mockSchools[Math.floor(Math.random()*mockSchools.length)],
        major:"计算机相关",
        experience:Math.floor(Math.random()*8),
        position:mockPositions[Math.floor(Math.random()*mockPositions.length)],
        skills:mockSkillSets[Math.floor(Math.random()*mockSkillSets.length)],
        status:"初筛",
        phone:`1${['3','5','7','8'][Math.floor(Math.random()*4)]}${Math.floor(Math.random()*1e9).toString().padStart(9,'0').slice(0,8).replace(/(\d{4})(\d{4})/,'****$2')}`,
        email:`${name.toLowerCase().replace(/[^\w]/g,'')}@email.com`,
        appliedAt:new Date().toISOString().slice(0,10),
        salary:`${10+Math.floor(Math.random()*30)}K-${20+Math.floor(Math.random()*30)}K`,
        city:["北京","上海","深圳","广州","杭州","成都"][Math.floor(Math.random()*6)],
        resumeText:`${name}的简历，从${mockSchools[Math.floor(Math.random()*mockSchools.length)]}毕业。`,
        aiComment:"通过AI自动解析导入的候选人。",
        tags:["新导入"],
        interviewCount:0,offerSent:false,
        score:0,
      };
      parsedCandidate.score=AI.score(parsedCandidate);
      setQueue(p=>p.map((f,j)=>j===i?{...f,status:"已解析",parsed:parsedCandidate}:f));
      setProgress(Math.round((i+1)/queue.length*100));
    }
    const newCandidates=queue.map((f,i)=>f.parsed).filter(Boolean);
    setCandidates(p=>[...newCandidates,...p]);
    setProcessing(false);
    notify(`✅ 成功解析 ${queue.length} 份简历，AI 评分完成！`);
  };

  return(
    <div>
      <SectionHead title="上传简历" sub="支持 PDF、Word、图片等格式，AI 自动解析并评分"/>

        <div>
          {/* Drop Zone */}
          <div onDragOver={e=>{e.preventDefault();setDragging(true)}} onDragLeave={()=>setDragging(false)} onDrop={e=>{e.preventDefault();setDragging(false);addFiles(e.dataTransfer.files)}} onClick={()=>ref.current.click()} className="card"
            style={{padding:"50px 20px",textAlign:"center",cursor:"pointer",borderStyle:"dashed",borderColor:dragging?"#6366f1":"rgba(255,255,255,0.1)",background:dragging?"rgba(99,102,241,0.06)":"#13151f",marginBottom:16,transition:"all .2s"}}>
            <div style={{fontSize:44,marginBottom:12}}>📤</div>
            <div style={{fontSize:16,fontWeight:600,color:"#f1f5f9",marginBottom:6}}>拖拽简历文件到此处</div>
            <div style={{fontSize:13,color:"#6b7280",marginBottom:16}}>或点击选择文件，支持批量上传</div>
            <div style={{display:"inline-flex",gap:8}}>
              {["PDF","DOCX","JPG","PNG","TXT"].map(t=><span key={t} className="tag" style={{background:"rgba(99,102,241,0.12)",color:"#818cf8",border:"1px solid rgba(99,102,241,0.2)"}}>{t}</span>)}
            </div>
            <input ref={ref} type="file" multiple accept=".pdf,.docx,.doc,.jpg,.jpeg,.png,.txt" style={{display:"none"}} onChange={e=>addFiles(e.target.files)}/>
          </div>

          {/* Queue */}
          {queue.length>0&&(
            <div className="card" style={{overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.06)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>解析队列</span>
                  <span className="badge" style={{background:"rgba(99,102,241,0.15)",color:"#818cf8"}}>{queue.length}份</span>
                  {processing&&<span style={{fontSize:12,color:"#f59e0b"}}>AI解析中 {progress}%</span>}
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btn-ghost" style={{fontSize:12}} onClick={()=>setQueue([])}>清空</button>
                  <button className="btn btn-primary" style={{fontSize:12}} disabled={processing} onClick={processAll}>
                    {processing?"⏳ 解析中...":"⚡ 开始AI解析"}
                  </button>
                </div>
              </div>
              {processing&&(
                <div style={{padding:"10px 18px",background:"rgba(99,102,241,0.06)",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                  <ProgressBar value={progress} color="#6366f1" height={6}/>
                </div>
              )}
              {queue.map((f,i)=>(
                <div key={f.id} style={{display:"flex",alignItems:"center",gap:12,padding:"11px 18px",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                  <div style={{width:36,height:36,borderRadius:8,background:{PDF:"rgba(239,68,68,0.15)",DOCX:"rgba(59,130,246,0.15)",DOC:"rgba(59,130,246,0.15)",JPG:"rgba(16,185,129,0.15)",PNG:"rgba(16,185,129,0.15)"}[f.type]||"rgba(255,255,255,0.06)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,color:"#94a3b8",fontWeight:700}}>{f.type}</div>
                  <div style={{flex:1}}>
                    <div style={{fontSize:13,color:"#e2e8f0",fontWeight:500}}>{f.name}</div>
                    <div style={{fontSize:11,color:"#6b7280"}}>{(f.size/1024).toFixed(1)} KB{f.parsed&&` · 解析为：${f.parsed.name}（${f.parsed.score}分）`}</div>
                  </div>
                  <span className="badge" style={{background:f.status==="已解析"?"rgba(16,185,129,0.12)":"rgba(245,158,11,0.12)",color:f.status==="已解析"?"#34d399":"#f59e0b"}}>{f.status}</span>
                </div>
              ))}
            </div>
          )}
        </div>

        {/* Side info */}
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          <div className="card" style={{padding:18}}>
            <div style={{fontSize:13,fontWeight:600,color:"#f1f5f9",marginBottom:12}}>AI 解析能力</div>
            {[["👤","自动识别姓名、联系方式"],["🎓","学历院校专业提取"],["💼","工作经历智能解析"],["⚡","技能标签自动标注"],["📊","综合实力评分计算"],["🏷","候选人标签自动生成"]].map(([ic,tx],i)=>(
              <div key={i} style={{display:"flex",gap:8,padding:"6px 0",borderBottom:"1px solid rgba(255,255,255,0.04)",fontSize:12,color:"#9ca3af"}}>
                <span>{ic}</span><span>{tx}</span>
              </div>
            ))}
          </div>
          <div className="card" style={{padding:18}}>
            <div style={{fontSize:13,fontWeight:600,color:"#f1f5f9",marginBottom:12}}>本月统计</div>
            <div className="grid2" style={{gap:10}}>
              {[["已上传","127","#6366f1"],["已解析","124","#10b981"],["导入失败","3","#ef4444"],["准确率","97.6%","#f59e0b"]].map(([l,v,c],i)=>(
                <div key={i} style={{textAlign:"center",padding:10,background:"rgba(255,255,255,0.03)",borderRadius:8}}>
                  <div style={{fontSize:18,fontWeight:700,color:c}}>{v}</div>
                  <div style={{fontSize:10,color:"#6b7280"}}>{l}</div>

  );
}

    </div>
  );

/* ═══════════════════════════════════════════════════
   SMART FILTER PAGE
═══════════════════════════════════════════════════ */
function FilterPage({candidates,setCandidates,notify}){
  const [cr,setCr]=useState({education:"全部",gender:"全部",minExp:0,maxExp:20,minScore:60,city:"全部",skill:"",position:""});
  const [result,setResult]=useState(null);
  const [filtering,setFiltering]=useState(false);
  const [selectedJob,setSelectedJob]=useState(null);
  const [autoMode,setAutoMode]=useState(false);

  const cities=[...new Set(candidates.map(c=>c.city))];

  const doFilter=async()=>{
    setFiltering(true);
    await new Promise(r=>setTimeout(r,900));
    const criteria={...cr,minExp:cr.minExp,minScore:cr.minScore};
    if(cr.education==="全部")delete criteria.education;
    if(cr.gender==="全部")delete criteria.gender;
    if(cr.city==="全部")delete criteria.city;
    if(!cr.skill)delete criteria.skill;
    if(!cr.position)delete criteria.position;
    const res=AI.autoFilter(candidates,criteria);
    setResult(res);setFiltering(false);
    notify(`⚡ 筛选完成，共 ${res.length} 位候选人符合条件`);
  };

  const applyBatch=(newStatus)=>{
    if(!result)return;
    let count=0;
    setCandidates(p=>p.map(c=>{
      if(result.find(r=>r.id===c.id)&&c.status!=="已Offer"&&c.status!=="已入职"){count++;return{...c,status:newStatus};}
      return c;
    }));
    notify(`✅ 已将 ${count} 位候选人状态更新为「${newStatus}」`);
  };

  const jobRecommend=()=>{
    if(!selectedJob)return;
    const recs=AI.recommend(candidates,selectedJob);
    setResult(recs);
    notify(`🎯 已为「${selectedJob.title}」推荐 ${recs.length} 位最匹配候选人`);
  };

  return(
    <div>
      <SectionHead title="智能筛选" sub="AI 多维度精准匹配，支持批量操作"/>
      <div style={{display:"grid",gridTemplateColumns:"300px 1fr",gap:18}}>
        {/* Left Panel */}
        <div style={{display:"flex",flexDirection:"column",gap:14}}>
          {/* Mode Toggle */}
          <div className="card" style={{padding:14}}>
            <div style={{fontSize:12,fontWeight:600,color:"#f1f5f9",marginBottom:10}}>筛选模式</div>
            <div style={{display:"flex",gap:8}}>
              <button onClick={()=>setAutoMode(false)} className="btn" style={{flex:1,fontSize:11,padding:"7px",background:!autoMode?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(255,255,255,0.04)",border:!autoMode?"none":"1px solid rgba(255,255,255,0.09)",color:!autoMode?"#fff":"#9ca3af",borderRadius:7}}>条件筛选</button>
              <button onClick={()=>setAutoMode(true)} className="btn" style={{flex:1,fontSize:11,padding:"7px",background:autoMode?"linear-gradient(135deg,#6366f1,#8b5cf6)":"rgba(255,255,255,0.04)",border:autoMode?"none":"1px solid rgba(255,255,255,0.09)",color:autoMode?"#fff":"#9ca3af",borderRadius:7}}>职位匹配</button>
            </div>
          </div>

          {!autoMode?(
            <div className="card" style={{padding:16}}>
              <div style={{fontSize:13,fontWeight:600,color:"#f1f5f9",marginBottom:14}}>筛选条件</div>
              {[["学历要求",<select key="edu" className="inp" value={cr.education} onChange={e=>setCr(p=>({...p,education:e.target.value}))} style={{fontSize:12}}>{["全部","本科","硕士","博士"].map(v=><option key={v}>{v}</option>)}</select>],
                ["性别要求",<select key="gender" className="inp" value={cr.gender} onChange={e=>setCr(p=>({...p,gender:e.target.value}))} style={{fontSize:12}}>{["全部","男","女"].map(v=><option key={v}>{v}</option>)}</select>],
                ["目标城市",<select key="city" className="inp" value={cr.city} onChange={e=>setCr(p=>({...p,city:e.target.value}))} style={{fontSize:12}}>{["全部",...cities].map(v=><option key={v}>{v}</option>)}</select>],
                ["技能关键词",<input key="skill" className="inp" value={cr.skill} onChange={e=>setCr(p=>({...p,skill:e.target.value}))} placeholder="如：React、Python..." style={{fontSize:12}}/>],

              <div style={{marginBottom:14}}>
                <div style={{display:"flex",justifyContent:"space-between",fontSize:11,color:"#6b7280",marginBottom:4}}>
                  <span>最低AI评分</span><span style={{color:"#a5b4fc"}}>{cr.minScore}分</span>
                </div>
                <input type="range" min="0" max="100" value={cr.minScore} onChange={e=>setCr(p=>({...p,minScore:+e.target.value}))}/>

              </button>
            </div>
          ):(
            <div className="card" style={{padding:16}}>
              <div style={{fontSize:13,fontWeight:600,color:"#f1f5f9",marginBottom:12}}>选择目标职位</div>

                <div key={job.id} onClick={()=>setSelectedJob(job)} style={{padding:"10px 12px",borderRadius:8,border:`1px solid ${selectedJob?.id===job.id?"#6366f1":"rgba(255,255,255,0.07)"}`,background:selectedJob?.id===job.id?"rgba(99,102,241,0.1)":"transparent",cursor:"pointer",marginBottom:8,transition:"all .15s"}}>
                  <div style={{fontSize:13,color:"#f1f5f9",fontWeight:500}}>{job.title}</div>
                  <div style={{fontSize:11,color:"#6b7280",marginTop:2}}>{job.dept} · {job.location}</div>
                  <div style={{display:"flex",gap:5,marginTop:6,flexWrap:"wrap"}}>{job.skills.map((s,i)=><Tag key={i} label={s} color="#8b5cf6"/>)}</div>
                </div>
              ))}
              <button className="btn btn-primary" style={{width:"100%",marginTop:4}} onClick={jobRecommend} disabled={!selectedJob}>
                🎯 AI 智能推荐
              </button>
            </div>
          )}
        </div>

        {/* Results */}
        <div>
          {result?(
            <div className="card" style={{overflow:"hidden"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"14px 18px",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>
                <div style={{display:"flex",alignItems:"center",gap:10}}>
                  <span style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>筛选结果</span>
                  <span className="badge" style={{background:"rgba(99,102,241,0.15)",color:"#818cf8"}}>{result.length}人</span>
                </div>
                <div style={{display:"flex",gap:8}}>
                  <button className="btn btn-ghost" style={{fontSize:11}} onClick={()=>applyBatch("已筛选")}>批量→已筛选</button>
                  <button className="btn btn-success" style={{fontSize:11}} onClick={()=>applyBatch("待面试")}>批量→待面试</button>
                  <button className="btn btn-danger" style={{fontSize:11}} onClick={()=>applyBatch("已拒绝")}>批量淘汰</button>
                </div>
              </div>
              {result.length===0?(
                <div style={{padding:40,textAlign:"center",color:"#4b5563"}}><div style={{fontSize:32,marginBottom:8}}>🔍</div>无符合条件的候选人</div>
              ):result.map(c=>(
                <div key={c.id} style={{display:"flex",alignItems:"center",gap:14,padding:"12px 18px",borderBottom:"1px solid rgba(255,255,255,0.03)"}}>
                  <Avatar name={c.name} size={38}/>
                  <div style={{flex:1}}>
                    <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                      <span style={{fontSize:13,fontWeight:600,color:"#f1f5f9"}}>{c.name}</span>
                      <span style={{fontSize:12,color:"#6b7280"}}>· {c.gender} · {c.education} · {c.experience}年 · {c.city}</span>
                      {c.matchScore!=null&&<span className="badge" style={{background:"rgba(16,185,129,0.12)",color:"#34d399"}}>匹配度 {c.matchScore}%</span>}
                    </div>
                    <div style={{fontSize:11,color:"#6b7280"}}>{c.position} | {c.skills.slice(0,4).join(" · ")}</div>
                  </div>
                  <StatusBadge status={c.status}/>
                  <ScoreRing score={c.score} size={38}/>
                </div>
              ))}
            </div>
          ):(
            <div className="card" style={{padding:60,textAlign:"center"}}>
              <div style={{fontSize:48,marginBottom:16}}>⚡</div>
              <div style={{fontSize:16,color:"#6b7280",marginBottom:8}}>设置筛选条件后点击开始</div>
              <div style={{fontSize:13,color:"#374151"}}>AI 将根据多维度条件精准匹配候选人</div>
            </div>
          )}
        </div>
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   ASSESSMENT PAGE
═══════════════════════════════════════════════════ */
function AssessmentPage({candidates}){
  const [sortBy,setSortBy]=useState("score");
  const [filterEdu,setFilterEdu]=useState("全部");
  const sorted=[...candidates]
    .filter(c=>filterEdu==="全部"||c.education===filterEdu)
    .sort((a,b)=>sortBy==="score"?b.score-a.score:b.experience-a.experience);

  const avgScore=Math.round(candidates.reduce((a,c)=>a+c.score,0)/candidates.length);
  const top90=candidates.filter(c=>c.score>=90).length;

  return(
    <div>
      <SectionHead title="能力评估" sub="AI 综合评分系统，多维度评估候选人能力"/>
      <div className="grid4" style={{marginBottom:18}}>
        {[["平均评分",avgScore,"#6366f1"],["优秀（≥90）",top90,"#10b981"],["良好（75-89）",candidates.filter(c=>c.score>=75&&c.score<90).length,"#f59e0b"],["待考察（<75）",candidates.filter(c=>c.score<75).length,"#ef4444"]].map(([l,v,c],i)=>(
          <div key={i} className="card" style={{padding:16,textAlign:"center"}}><div style={{fontSize:26,fontWeight:700,color:c}}>{v}</div><div style={{fontSize:11,color:"#6b7280",marginTop:4}}>{l}</div></div>
        ))}
      </div>
      <div style={{display:"flex",gap:10,marginBottom:14}}>
        <select className="inp" value={sortBy} onChange={e=>setSortBy(e.target.value)} style={{width:120}}>
          <option value="score">按评分排序</option>
          <option value="exp">按经验排序</option>
        </select>
        <select className="inp" value={filterEdu} onChange={e=>setFilterEdu(e.target.value)} style={{width:100}}>
          {["全部","本科","硕士","博士"].map(v=><option key={v}>{v}</option>)}
        </select>
      </div>
      <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(280px,1fr))",gap:14}}>
        {sorted.map((c,rank)=>{
          const dims=[
            {l:"技术能力",v:Math.min(99,Math.round(c.score*0.92))},
            {l:"工作经验",v:Math.min(99,c.experience*11)},
            {l:"学历背景",v:c.education==="博士"?97:c.education==="硕士"?86:74},
            {l:"综合潜力",v:Math.min(99,Math.round(c.score*0.88))},
          ];
          return(
            <div key={c.id} className="card" style={{padding:18}}>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:14}}>
                <div style={{width:24,height:24,borderRadius:"50%",background:rank<3?"linear-gradient(135deg,#f59e0b,#d97706)":"rgba(255,255,255,0.07)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:11,fontWeight:700,color:"#fff",flexShrink:0}}>{rank+1}</div>
                <Avatar name={c.name} size={38}/>
                <div style={{flex:1}}>
                  <div style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>{c.name}</div>
                  <div style={{fontSize:11,color:"#6b7280"}}>{c.position}</div>
                </div>
                <ScoreRing score={c.score} size={40}/>
              </div>
              {dims.map((d,i)=>(
                <div key={i} style={{marginBottom:8}}>
                  <div style={{display:"flex",justifyContent:"space-between",fontSize:11,marginBottom:3}}>
                    <span style={{color:"#9ca3af"}}>{d.l}</span>
                    <span style={{color:"#e2e8f0",fontWeight:600}}>{d.v}</span>
                  </div>
                  <ProgressBar value={d.v} color={["#6366f1","#8b5cf6","#a78bfa","#10b981"][i]} height={5}/>
                </div>
              ))}
              <div style={{marginTop:10,display:"flex",flexWrap:"wrap",gap:4}}>
                {c.skills.slice(0,4).map((s,i)=><Tag key={i} label={s} color={["#6366f1","#8b5cf6","#14b8a6","#f59e0b"][i%4]}/>)}
              </div>
              <div style={{marginTop:10,fontSize:11,color:"#6b7280",background:"rgba(255,255,255,0.03)",borderRadius:6,padding:"6px 8px"}}>{c.aiComment}</div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

/* ═══════════════════════════════════════════════════
   INTERVIEWS PAGE
═══════════════════════════════════════════════════ */
function InterviewsPage({interviews,setInterviews,candidates,notify}){
  const [showModal,setShowModal]=useState(false);
  const [editModal,setEditModal]=useState(null);
  const [newIv,setNewIv]=useState({candidateId:"",type:"技术面",date:"",time:"",interviewer:"",room:""});
  const days=["2026-03-23","2026-03-24","2026-03-25","2026-03-26","2026-03-27"];
  const dayNames=["周一","周二","周三","周四","周五"];
  const today="2026-03-23";

  const scheduleIv=()=>{
    const c=candidates.find(x=>x.id===+newIv.candidateId);
    if(!c||!newIv.date||!newIv.time||!newIv.interviewer)return;
    const iv={...newIv,id:Date.now(),candidate:c.name,position:c.position,status:"待进行",notes:"",result:"",score:0,interviewerAvatar:newIv.interviewer[0]};
    setInterviews(p=>[...p,iv]);
    notify(`✅ 面试已安排：${c.name} · ${newIv.date} ${newIv.time}`);
    setShowModal(false);
    setNewIv({candidateId:"",type:"技术面",date:"",time:"",interviewer:"",room:""});
  };

  const completeIv=(id,result,score)=>{
    setInterviews(p=>p.map(iv=>iv.id===id?{...iv,status:"已完成",result,score}:iv));
    notify(`面试结果已记录：${result}`);
    setEditModal(null);
  };

  const TYPE_COLORS={"技术面":"#6366f1","HR面":"#10b981","终面":"#ef4444","高管面":"#f59e0b","作品评审":"#8b5cf6"};

  return(
    <div>
      <SectionHead title="面试管理" sub="智能排期，全流程面试跟踪"
        action={<button className="btn btn-primary" style={{fontSize:12}} onClick={()=>setShowModal(true)}>+ 安排面试</button>}/>

      {/* Calendar */}
      <div className="card" style={{padding:18,marginBottom:16}}>
        <div style={{fontSize:13,fontWeight:600,color:"#f1f5f9",marginBottom:12}}>本周面试日历</div>
        <div style={{display:"grid",gridTemplateColumns:"repeat(5,1fr)",gap:10}}>
          {days.map((day,di)=>{
            const dayIvs=interviews.filter(iv=>iv.date===day);
            const isToday=day===today;
            return(
              <div key={day} style={{background:isToday?"rgba(99,102,241,0.1)":"rgba(255,255,255,0.02)",borderRadius:10,padding:12,border:isToday?"1px solid rgba(99,102,241,0.3)":"1px solid rgba(255,255,255,0.04)"}}>
                <div style={{textAlign:"center",marginBottom:8}}>
                  <div style={{fontSize:20,fontWeight:700,color:isToday?"#a5b4fc":"#e2e8f0"}}>{day.slice(8)}</div>
                  <div style={{fontSize:10,color:isToday?"#818cf8":"#6b7280"}}>{dayNames[di]}{isToday?" (今天)":""}</div>
                </div>
                {dayIvs.length===0&&<div style={{fontSize:10,color:"#374151",textAlign:"center"}}>无安排</div>}
                {dayIvs.map(iv=>(
                  <div key={iv.id} onClick={()=>setEditModal(iv)} style={{background:(TYPE_COLORS[iv.type]||"#6366f1")+"20",borderRadius:6,padding:"5px 7px",marginBottom:5,cursor:"pointer",border:`1px solid ${(TYPE_COLORS[iv.type]||"#6366f1")}30`}}>
                    <div style={{fontSize:10,fontWeight:600,color:TYPE_COLORS[iv.type]||"#818cf8"}}>{iv.time}</div>
                    <div style={{fontSize:11,color:"#e2e8f0"}}>{iv.candidate}</div>
                    <div style={{fontSize:10,color:"#6b7280"}}>{iv.type}</div>
                  </div>
                ))}
              </div>
            );
          })}
        </div>
      </div>

      {/* List */}
      <div className="card" style={{overflow:"hidden"}}>
        <div style={{padding:"12px 18px",fontSize:13,fontWeight:600,color:"#f1f5f9",borderBottom:"1px solid rgba(255,255,255,0.05)"}}>全部面试记录</div>
        {interviews.map(iv=>(
          <div key={iv.id} style={{display:"flex",gap:14,padding:"13px 18px",borderBottom:"1px solid rgba(255,255,255,0.03)",cursor:"pointer"}} onClick={()=>setEditModal(iv)}>
            <div style={{width:50,height:50,borderRadius:10,background:"rgba(99,102,241,0.1)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <div style={{fontSize:16,fontWeight:700,color:"#818cf8"}}>{iv.date.slice(8)}</div>
              <div style={{fontSize:9,color:"#6b7280"}}>{iv.time}</div>
            </div>
            <div style={{flex:1}}>
              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:4}}>
                <span style={{fontSize:14,fontWeight:600,color:"#f1f5f9"}}>{iv.candidate}</span>
                <span className="badge" style={{background:(TYPE_COLORS[iv.type]||"#6366f1")+"18",color:TYPE_COLORS[iv.type]||"#818cf8"}}>{iv.type}</span>
                <span className="badge" style={{background:iv.status==="已完成"?"rgba(16,185,129,0.12)":"rgba(245,158,11,0.12)",color:iv.status==="已完成"?"#34d399":"#f59e0b"}}>{iv.status}</span>
                {iv.result&&<span className="badge" style={{background:"rgba(99,102,241,0.12)",color:"#a5b4fc"}}>{iv.result}</span>}
              </div>
              <div style={{fontSize:12,color:"#6b7280"}}>{iv.position} · 面试官: {iv.interviewer} · {iv.room}</div>
              {iv.notes&&<div style={{fontSize:11,color:"#4b5563",marginTop:4}}>备注: {iv.notes}</div>}
            </div>
            {iv.score>0&&<ScoreRing score={iv.score} size={36}/>}
          </div>

          <div>
            <div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>候选人</div>
            <select className="inp" value={newIv.candidateId} onChange={e=>setNewIv(p=>({...p,candidateId:e.target.value}))}>
              <option value="">请选择...</option>

            </select>
          </div>
          <div className="grid2">
            <div>
              <div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>面试类型</div>
              <select className="inp" value={newIv.type} onChange={e=>setNewIv(p=>({...p,type:e.target.value}))}>
                {["技术面","HR面","终面","高管面","作品评审"].map(t=><option key={t}>{t}</option>)}
              </select>
            </div>
            <div>
              <div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>面试日期</div>
              <input className="inp" type="date" value={newIv.date} onChange={e=>setNewIv(p=>({...p,date:e.target.value}))}/>
            </div>
            <div>
              <div style={{fontSize:11,color:"#6b7280",marginBottom:4}}>面试时间</div>
              <input className="inp" type="time" value={newIv.time} onChange={e=>setNewIv(p=>({...p,time:e.target.value}))}/>
            </div>

}

function PipelinePage({candidates}){
  const stages=["初筛","已筛选","待面试","面试中","已Offer","已入职"];

    <div>
      <SectionHead title="招聘漏斗" sub="可视化招聘全流程，实时追踪候选人进度"/>

        <div style={{fontSize:13,fontWeight:600,color:"#f1f5f9",marginBottom:14}}>整体转化漏斗</div>
        {stages.map((s,i)=>{
          const cnt=candidates.filter(c=>c.status===s).length;
          const pct=candidates.length>0?Math.round(cnt/candidates.length*100):0;
          const colors=["#94a3b8","#60a5fa","#f59e0b","#a78bfa","#10b981","#06b6d4"];

                <div style={{width:`${Math.max(pct,2)}%`,height:"100%",background:colors[i],borderRadius:6,transition:"width .6s ease",display:"flex",alignItems:"center",paddingLeft:10}}>
                  {cnt>0&&<span style={{fontSize:11,color:"#fff",fontWeight:600,whiteSpace:"nowrap"}}>{cnt}人</span>}
                </div>
              </div>
              <div style={{width:36,fontSize:12,color:"#6b7280",textAlign:"right",flexShrink:0}}>{pct}%</div>
            </div>
          );
        })}
      </div>

      {/* Kanban */}
      <div style={{display:"grid",gridTemplateColumns:"repeat(6,1fr)",gap:12,overflowX:"auto"}}>
        {stageCandidates.map(({stage,items})=>(
          <div key={stage}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
              <span style={{fontSize:11,fontWeight:600,color:STATUS_CFG[stage]?.color||"#9ca3af"}}>{stage}</span>
              <span className="badge" style={{background:STATUS_CFG[stage]?.bg,color:STATUS_CFG[stage]?.color,fontSize:10}}>{items.length}</span>
            </div>
            <div style={{display:"flex",flexDirection:"column",gap:8,minHeight:200}}>
              {items.map(c=>(
                <div key={c.id} className="card" style={{padding:10}}>
                  <div style={{display:"flex",gap:7,alignItems:"center",marginBottom:6}}>
                    <Avatar name={c.name} size={24}/>

                      <div style={{fontSize:12,fontWeight:600,color:"#f1f5f9"}}>{c.name}</div>
                      <div style={{fontSize:10,color:"#6b7280",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",maxWidth:80}}>{c.position}</div>
                    </div>
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                    <span style={{fontSize:10,color:"#6b7280"}}>{c.education}</span>
                    <span style={{fontSize:11,fontWeight:700,color:c.score>=90?"#10b981":c.score>=75?"#f59e0b":"#9ca3af"}}>{c.score}</span>
                  </div>

              ))}

  );
}

function AIPage({candidates,setCandidates,notify}){
  const [chatHistory,setChatHistory]=useState([]);
  const WELCOME=`您好！我是 HireNova AI 招聘助手 🤖\n\n✅ 已内置 Claude AI，直接使用，无需任何配置！\n\n我可以帮您：\n• 🔍 自然语言筛选候选人并批量更新状态\n• 📊 深度分析候选人能力和岗位匹配度\n• 📈 生成完整招聘数据报告\n• 💡 制定个性化招聘策略\n\n试试这些指令：\n「帮我筛选硕士以上、5年以上经验的工程师，标记为待面试」\n「分析赵磊的综合能力，适合算法工程师吗？」\n「把所有评分90分以上的候选人批量更新为已筛选」\n「分析一下当前整体招聘情况」`;
  const [messages,setMessages]=useState([{role:"assistant",content:WELCOME}]);
  const [input,setInput]=useState("");
  const [loading,setLoading]=useState(false);
  const endRef=useRef();
  useEffect(()=>endRef.current?.scrollIntoView({behavior:"smooth"}),[messages]);

  const executeAction=(action)=>{
    if(action.type!=="filter_and_update")return 0;
    const{filters={},newStatus}=action; let count=0;
    setCandidates(prev=>prev.map(c=>{
      const ok=
        (!filters.education||filters.education==="null"||c.education===filters.education)&&
        (!filters.gender||filters.gender==="null"||c.gender===filters.gender)&&
        (filters.minExp==null||filters.minExp==="null"||c.experience>=Number(filters.minExp))&&
        (filters.minScore==null||filters.minScore==="null"||c.score>=Number(filters.minScore))&&
        (!filters.position||filters.position==="null"||c.position.includes(filters.position))&&
        (!filters.skill||filters.skill==="null"||c.skills.some(s=>s.includes(filters.skill)))&&
        (!filters.city||filters.city==="null"||c.city.includes(filters.city));
      if(ok&&!["已Offer","已入职"].includes(c.status)){count++;return{...c,status:newStatus};}
      return c;
    }));
    return count;
  };

  const send=async(override)=>{
    const msg=(override||input).trim();
    if(!msg||loading)return;
    setInput("");
    setMessages(p=>[...p,{role:"user",content:msg}]);
    setLoading(true);

    const ctx=candidates.map(c=>`[ID:${c.id}] ${c.name}|${c.gender}|${c.age}岁|${c.education}|${c.school}|${c.experience}年|${c.position}|技能:${c.skills.join("/")}|状态:${c.status}|评分:${c.score}|城市:${c.city}`).join("\n");
    const sys=`你是 HireNova AI 招聘助手，专业友好，用中文回答。
当前候选人（共${candidates.length}人）：
${ctx}

当用户要求筛选/标记/批量操作时，回复末尾附加（JSON不加注释）：
\`\`\`action
{"type":"filter_and_update","filters":{"education":"值或null","gender":"值或null","minExp":数字或null,"minScore":数字或null,"position":"值或null","skill":"值或null","city":"值或null"},"newStatus":"初筛|已筛选|待面试|已Offer|已拒绝"}
\`\`\`
仅查询分析时不附加。`;

    try{
      // Call our own Vercel backend proxy /api/chat
      // The proxy reads ANTHROPIC_API_KEY from server env var - key never exposed in browser
      const res=await fetch("/api/chat",{
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body:JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1200,
          system:sys,
          messages:[...chatHistory,{role:"user",content:msg}],
        }),
      });
      if(!res.ok){const e=await res.json().catch(()=>({}));throw new Error(e?.error?.message||`HTTP ${res.status}`);}
      const data=await res.json();
      const full=data.content?.find(b=>b.type==="text")?.text||"抱歉，暂时无法回应。";
      const am=full.match(/```action\s*([\s\S]*?)```/);
      let display=full.replace(/```action[\s\S]*?```/g,"").trim();
      if(am){
        try{
          const action=JSON.parse(am[1].trim());
          const cnt=executeAction(action);
          display+=`\n\n✅ **操作已执行**：成功更新 **${cnt}** 位候选人状态为「${action.newStatus}」。`;
          notify(`AI 已批量更新 ${cnt} 位候选人`);
        }catch{display+="\n\n⚠️ 操作指令解析失败，请重试。";}
      }
      setMessages(p=>[...p,{role:"assistant",content:display}]);
      setChatHistory(p=>[...p,{role:"user",content:msg},{role:"assistant",content:full}]);
    }catch(e){
      setMessages(p=>[...p,{role:"assistant",content:`❌ 请求失败：${e.message}`}]);
    }
    setLoading(false);
  };

  const QUICK=[
    {ic:"🔍",lb:"筛选硕士工程师",q:"帮我筛选学历硕士以上、3年以上经验的工程师，标记为已筛选"},
    {ic:"⭐",lb:"高分→待面试",q:"把所有AI评分90分以上的候选人标记为待面试"},
    {ic:"📊",lb:"整体分析",q:"详细分析当前招聘整体情况，给出优化建议"},
    {ic:"🎯",lb:"推荐Top5",q:"综合分析推荐最值得优先跟进的5位候选人"},
    {ic:"💼",lb:"算法岗匹配",q:"哪些候选人最适合算法工程师职位？"},
    {ic:"📈",lb:"完整报告",q:"生成本轮招聘的完整数据分析报告"},
  ];

  return(
    <div style={{display:"grid",gridTemplateColumns:"1fr 260px",gap:18,height:"calc(100vh - 96px)"}}>
      <div className="card" style={{display:"flex",flexDirection:"column",overflow:"hidden"}}>
        <div style={{padding:"12px 18px",borderBottom:"1px solid rgba(255,255,255,0.05)",display:"flex",alignItems:"center",gap:10,flexShrink:0}}>
          <div style={{width:34,height:34,borderRadius:9,background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:17}}>🤖</div>
          <div>
            <div style={{fontSize:13,fontWeight:600,color:"#f1f5f9"}}>AI 招聘助手</div>
            <div style={{display:"flex",alignItems:"center",gap:5}}><Dot color="#10b981"/><span style={{fontSize:10,color:"#10b981"}}>Claude AI · 在线</span></div>
          </div>
          <div className="ai-badge" style={{marginLeft:"auto",fontSize:10}}>⚡ 内置 Claude · 无需配置</div>
        </div>

        <div style={{flex:1,overflowY:"auto",padding:16}}>
          {messages.map((m,i)=>(
            <div key={i} style={{marginBottom:14,display:"flex",justifyContent:m.role==="user"?"flex-end":"flex-start",gap:8}}>
              {m.role==="assistant"&&<div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13,flexShrink:0}}>🤖</div>}
              <div style={{maxWidth:"80%",padding:"10px 14px",borderRadius:m.role==="user"?"14px 3px 14px 14px":"3px 14px 14px 14px",background:m.role==="user"?"linear-gradient(135deg,#4f46e5,#7c3aed)":"rgba(255,255,255,0.04)",border:m.role==="user"?"none":"1px solid rgba(255,255,255,0.07)",fontSize:13,color:"#e2e8f0",lineHeight:1.8,whiteSpace:"pre-wrap"}}>
                {m.content.split(/(\*\*[^*]+\*\*)/g).map((p,j)=>p.startsWith("**")&&p.endsWith("**")?<strong key={j} style={{color:"#a5b4fc"}}>{p.slice(2,-2)}</strong>:p)}
              </div>
              {m.role==="user"&&<Avatar name="我" size={28} style={{flexShrink:0}}/>}
            </div>
          ))}
          {loading&&(
            <div style={{display:"flex",gap:8,marginBottom:14}}>
              <div style={{width:28,height:28,borderRadius:"50%",background:"linear-gradient(135deg,#6366f1,#8b5cf6)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:13}}>🤖</div>
              <div style={{padding:"11px 14px",borderRadius:"3px 14px 14px 14px",background:"rgba(255,255,255,0.04)",border:"1px solid rgba(255,255,255,0.07)"}}>

              <button key={i} onClick={()=>send(q.q)} disabled={loading} style={{padding:"8px 10px",borderRadius:7,background:"rgba(99,102,241,0.07)",border:"1px solid rgba(99,102,241,0.13)",color:"#a5b4fc",fontSize:11,cursor:"pointer",textAlign:"left",display:"flex",alignItems:"center",gap:8,opacity:loading?.5:1}}>

        <div className="card" style={{padding:14}}>
